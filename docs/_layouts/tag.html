---
layout: default
---
{% if site.show-nav-menu %}
  {% include nav.html%}
{% endif %}

<div class="px-4 pt-4 prose prose-{{site.theme-color}}">
  <h1 class="text-center mt-6 mb-6">{{ page.title }}</h1>
  {% for tag in site.tags %}
    <div class="inline-flex items-center px-2.5 py-2.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 hover:bg-slate-500">
      <a class="!no-underline" href="{{site.baseurl}}/tag#{{ tag[0] }}">{{ tag[0] }}</a>
    </div>
  {% endfor %}


  <!-- divider -->
  <div class="relative my-8">
    <div class="absolute inset-0 flex items-center" aria-hidden="true">
      <div class="w-full border-t border-gray-200"></div>
    </div>
    <div class="relative flex justify-center ">
      <span class="bg-white px-2 text-gray-200">
        <i class="text-xs far fa-square"></i>
      </span>
    </div>
  </div>

{{ content }}
</div>
